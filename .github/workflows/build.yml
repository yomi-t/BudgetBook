name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app/Contents/Developer

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
                     -project BudgetBook.xcodeproj \
                     -scheme BudgetBook

      - name: Archive Project
        run: |
          xcodebuild archive -project BudgetBook.xcodeproj \
                             -scheme BudgetBook \
                             -sdk iphoneos \
                             -configuration Release \
                             -archivePath BudgetBook.xcarchive \
                             CODE_SIGNING_ALLOWED=NO \
                             CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Create ExportOptions.plist
        run: |
          echo '${{ secrets.EXPORT_OPTIONS }}' > ExportOptions.plist

      - name: Create Private Key
        run: |
          mkdir private_keys
          echo -n '${{ secrets.APPLE_API_KEY_BASE64 }}' | base64 --decode > ./private_keys/AuthKey_${{ secrets.APPLE_API_ISSUER_ID }}.p8

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath BudgetBook.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath app.ipa \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath `pwd`/private_keys/AuthKey_${{ secrets.APPLE_API_ISSUER_ID }}.p8 \
                     -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
                     -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Upload IPA to App Store Connect
        run: |
          xcrun altool --upload-app -f app.ipa/BudgetBook.ipa \
                       --type ios \
                       --apiKey ${{ secrets.APPLE_API_KEY_ID }} \
                       --apiIssuer ${{ secrets.APPLE_API_ISSUER_ID }}