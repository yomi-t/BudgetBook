name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: macos-26
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Clean Derived Data
        run: rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Create Private Key
        run: |
          mkdir -p private_keys
          echo -n '${{ secrets.APPLE_API_KEY_BASE64 }}' | base64 --decode > ./private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: "temp_password" # ランナー上の一時的なパスワード
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Base64からp12ファイルに復号
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # 一時的なキーチェーンを作成
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 証明書をキーチェーンにインポート
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Resolve Package Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
                     -project BudgetBook.xcodeproj \
                     -scheme BudgetBook \
                     -skipPackagePluginValidation

      - name: Archive Project
        run: |
          xcodebuild archive -project BudgetBook.xcodeproj \
                             -scheme BudgetBook \
                             -sdk iphoneos \
                             -configuration Release \
                             -archivePath BudgetBook.xcarchive \
                             CURRENT_PROJECT_VERSION=${{ github.run_number }} \
                             -allowProvisioningUpdates \
                             -authenticationKeyPath `pwd`/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
                             -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
                             -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUER_ID }} \
                             -skipMacroValidation \
                             -skipPackagePluginValidation

      - name: Create ExportOptions.plist
        run: |
          echo '${{ secrets.EXPORT_OPTIONS }}' > ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
                     -archivePath BudgetBook.xcarchive \
                     -exportOptionsPlist ExportOptions.plist \
                     -exportPath app \
                     -allowProvisioningUpdates \
                     -authenticationKeyPath `pwd`/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
                     -authenticationKeyID ${{ secrets.APPLE_API_KEY_ID }} \
                     -authenticationKeyIssuerID ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Upload IPA to App Store Connect
        run: |
          xcrun altool --upload-app -f app.ipa/BudgetBook.ipa \
                       --type ios \
                       --apiKey ${{ secrets.APPLE_API_KEY_ID }} \
                       --apiIssuer ${{ secrets.APPLE_API_ISSUER_ID }}